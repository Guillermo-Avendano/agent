services:
  # ─── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
      POSTGRES_DB: ${POSTGRES_DB:-agent_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_user} -d ${POSTGRES_DB:-agent_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Qdrant ────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.13.2
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Agent API ─────────────────────────────────────────────
  agent-api:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./charts_output:/app/charts_output
      - ./schema_descriptions:/app/schema_descriptions:ro
      - ./files_for_memory:/app/files_for_memory:ro
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      browserless:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Browserless Chromium (web scraping) ───────────────────
  browserless:
    image: ghcr.io/browserless/chromium:v2.39.0
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      # Timeout for page loads (ms)
      DEFAULT_LAUNCH_ARGS: '["--no-sandbox","--disable-setuid-sandbox"]'
      TIMEOUT: 30000
      CONCURRENT: 5
      QUEUED: 10
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/json/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── AnythingLLM ─────────────────────────────────────────
  anythingllm:
    image: mintplexlabs/anythingllm:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      STORAGE_DIR: /app/server/storage
      LLM_PROVIDER: generic-openai
      GENERIC_OPEN_AI_BASE_PATH: http://agent-api:8000/v1
      GENERIC_OPEN_AI_MODEL_PREF: ${AGENT_NAME:-Guille-Agent}
      GENERIC_OPEN_AI_TOKEN_LIMIT: 8192
      # No API key needed — leave empty
      GENERIC_OPEN_AI_API_KEY: sk-not-required
    volumes:
      - ./anythingllm/plugins:/app/server/storage/plugins
    depends_on:
      agent-api:
        condition: service_healthy
      contentedge-mcp:
        condition: service_healthy

  # ─── ContentEdge MCP Server ────────────────────────────────
  contentedge-mcp:
    build: ./contentedge
    restart: unless-stopped
    expose:
      - "8001"
    ports:
      - "8001:8001"
    volumes:
      - ./contentedge/files:/app/files
      - ./contentedge/conf:/app/conf
    environment:
      MCP_TRANSPORT: sse
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8001"
      CE_WORK_DIR: /app/files
      # Source repository overrides (from .env)
      CE_SOURCE_REPO_URL: ${CE_SOURCE_REPO_URL:-}
      CE_SOURCE_REPO_NAME: ${CE_SOURCE_REPO_NAME:-}
      CE_SOURCE_REPO_USER: ${CE_SOURCE_REPO_USER:-}
      CE_SOURCE_REPO_PASS: ${CE_SOURCE_REPO_PASS:-}
      CE_SOURCE_REPO_SERVER_USER: ${CE_SOURCE_REPO_SERVER_USER:-}
      CE_SOURCE_REPO_SERVER_PASS: ${CE_SOURCE_REPO_SERVER_PASS:-}
      # Target repository overrides (from .env)
      CE_TARGET_REPO_URL: ${CE_TARGET_REPO_URL:-}
      CE_TARGET_REPO_NAME: ${CE_TARGET_REPO_NAME:-}
      CE_TARGET_REPO_USER: ${CE_TARGET_REPO_USER:-}
      CE_TARGET_REPO_PASS: ${CE_TARGET_REPO_PASS:-}
      CE_TARGET_REPO_SERVER_USER: ${CE_TARGET_REPO_SERVER_USER:-}
      CE_TARGET_REPO_SERVER_PASS: ${CE_TARGET_REPO_SERVER_PASS:-}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/sse', timeout=3)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  qdrant_data:
