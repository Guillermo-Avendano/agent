<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 240 280"
  width="360"
  height="420"
>
  <defs>
    <style>
      .linea { stroke: #0f0f0f; stroke-width: 5; stroke-linecap: round; fill: none; }
    </style>
  </defs>

  <!-- Cabeza (círculo sin relleno) -->
  <circle cx="120" cy="52" r="30" class="linea" />

  <!-- Cuerpo -->
  <line x1="120" y1="82" x2="120" y2="162" class="linea" />

  <!-- Brazos (sin manos) -->
  <!-- Brazos acaban un poco antes para que coloques el guante separado -->
  <line x1="120" y1="102" x2="75"  y2="126" class="linea" />
  <line x1="120" y1="102" x2="165" y2="126" class="linea" />

  <!-- Piernas -->
  <line x1="120" y1="162" x2="88"  y2="230" class="linea" />
  <line x1="120" y1="162" x2="152" y2="230" class="linea" />
</svg>