<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 200 260"
  width="300"
  height="390"
>
  <!-- Estilos generales -->
  <defs>
    <style>
      .linea { stroke: #111; stroke-width: 4; stroke-linecap: round; fill: none; }
      .guante { fill: #ffffff; stroke: #111; stroke-width: 3; }
    </style>
  </defs>

  <!-- Cabeza (círculo sin relleno) -->
  <circle cx="100" cy="50" r="28" class="linea" />

  <!-- Cuerpo -->
  <line x1="100" y1="78" x2="100" y2="150" class="linea" />

  <!-- Brazos -->
  <!-- Brazo izquierdo -->
  <line x1="100" y1="95" x2="52"  y2="120" class="linea" />
  <!-- Brazo derecho -->
  <line x1="100" y1="95" x2="148" y2="120" class="linea" />

  <!-- Piernas -->
  <!-- Pierna izquierda -->
  <line x1="100" y1="150" x2="70"  y2="210" class="linea" />
  <!-- Pierna derecha -->
  <line x1="100" y1="150" x2="130" y2="210" class="linea" />

  <!-- Manos: guantes de estilo cartoon (relleno blanco) -->
  <!-- Guante izquierdo -->
  <path class="guante"
        d="M 52 120
           c -6 -4 -10 -2 -12 3
           c -3 6 0 13 6 16
           c 5 3 12 1 14 -4
           c 0.5 -1.2 0.8 -2.6 0.8 -4
           c 0 -1.2 -0.2 -2.4 -0.6 -3.4
           c 3 1 6 1 8 -1
           c 2 -2 2 -5 -0.5 -7
           c -2.5 -2 -6 -1.8 -8.7 0.4
           c -0.6 0.5 -1.1 1.2 -1.5 1.9
           c -0.7 -1.2 -1.7 -2.2 -2.5 -2.9
           Z" />

  <!-- Guante derecho -->
  <path class="guante"
        d="M 148 120
           c 6 -4 10 -2 12 3
           c 3 6 0 13 -6 16
           c -5 3 -12 1 -14 -4
           c -0.5 -1.2 -0.8 -2.6 -0.8 -4
           c 0 -1.2 0.2 -2.4 0.6 -3.4
           c -3 1 -6 1 -8 -1
           c -2 -2 -2 -5 0.5 -7
           c 2.5 -2 6 -1.8 8.7 0.4
           c 0.6 0.5 1.1 1.2 1.5 1.9
           c 0.7 -1.2 1.7 -2.2 2.5 -2.9
           Z" />

  <!-- Detalles de “pliegues” en los guantes (opcional) -->
  <path class="linea" d="M 57 132 c 3 1 6 1.5 9 0.5" />
  <path class="linea" d="M 143 132 c -3 1 -6 1.5 -9 0.5" />
</svg>