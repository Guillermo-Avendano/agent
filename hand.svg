<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="-6 -12 96 92"
  width="220"
  height="210"
>
  <defs>
    <style>
      .guante { fill: #ffffff; stroke: #0f0f0f; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
      .pliegue { stroke: #0f0f0f; stroke-width: 3.5; stroke-linecap: round; fill: none; opacity: 0.9; }
    </style>
  </defs>

  <!-- Guante cartoon (mano derecha, palma al frente, 5 dedos) -->
  <!-- Diseño: palma oval + 4 lóbulos superiores (meñique a índice) + pulgar lateral -->
  <path class="guante" d="
    M 18,36
    C 11,34 6,38 6,44
      6,51 11,57 18,60
      27,64 40,63 48,58
      52,55 55,52 56.8,48.5

      <!-- Meñique -->
      C 58.2,46 58.7,43.7 58.5,41.6
        58.3,40 59.6,38.6 61.2,38.4
        62.9,38.2 64.4,39.5 64.5,41.2
        64.7,44.0 64.1,47.0 63.0,49.5

      <!-- Anular -->
      C 64.1,49.7 65.3,49.1 66.2,48.1
        67.7,46.5 68.6,44.1 69.0,41.7
        69.4,39.2 69.2,36.5 69.0,34.9
        68.8,33.3 70.2,31.8 71.9,31.6
        73.8,31.4 75.3,32.8 75.5,34.6
        75.9,37.6 75.7,40.8 75.0,43.5

      <!-- Medio -->
      C 76.3,43.6 77.6,42.8 78.5,41.6
        80.0,39.6 81.0,36.8 81.5,34.0
        82.0,31.0 81.9,27.6 81.7,25.4
        81.5,23.6 83.0,22.1 84.8,21.9
        86.7,21.7 88.3,23.2 88.5,25.1
        89.0,28.8 88.7,32.8 87.8,36.0

      <!-- Índice -->
      C 89.2,36.2 90.5,35.3 91.4,34.0
        92.8,32.0 93.8,28.9 94.2,26.0
        94.5,23.3 94.4,20.2 94.2,18.2
        93.9,16.2 95.6,14.5 97.6,14.3
        99.8,14.1 101.6,15.8 101.8,18.0
        102.2,21.6 102.0,25.3 101.2,28.2

      <!-- Pulgar (lateral, hacia arriba) -->
      C 103.8,28.0 105.7,28.7 106.9,30.1
        108.4,31.8 108.2,34.4 106.6,35.8
        103.1,38.8 97.4,41.0 92.6,41.4
        88.2,41.8 84.3,41.0 80.9,39.6

      <!-- Regreso por el talón del guante hacia la base de la palma -->
      C 76.8,43.5 71.4,46.0 65.6,46.7
        58.4,47.6 50.8,45.8 44.9,42.4
        39.6,39.3 35.9,34.8 33.9,30.7
        31.4,33.8 28.1,36.0 24.4,36.5
        22.5,36.8 20.2,36.6 18,36
      Z" />

  <!-- Pliegues de la palma (opcionales; podés borrar estas dos líneas si querés liso) -->
  <path class="pliegue" d="M 30,42 C 35,43.4 40,43.6 45,42.8" />
  <path class="pliegue" d="M 27,38 C 31,38.8 34.2,38.8 37.5,38.0" />
</svg>